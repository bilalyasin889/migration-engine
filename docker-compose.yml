services:
  mysql-db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  migration-runner:
    build: .
    depends_on:
      mysql-db:
        condition: service_healthy
    volumes:
      - ./src:/var/task/src
      - ./test:/var/task/test
    environment:
      ENV: local
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
    entrypoint: ["python", "src/engine.py"]